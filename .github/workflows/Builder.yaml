name: Build Dobby Android

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r25c
        local-ndk-install-path: ${{ runner.temp }}/ndk
        link-to-system: true

    - name: Find NDK path
      run: |
        echo "NDK path from setup-ndk: ${{ steps.setup-ndk.outputs.ndk-path }}"
        find ${{ runner.temp }}/ndk -name "android.toolchain.cmake" 2>/dev/null || true
        find /usr/local -name "android.toolchain.cmake" 2>/dev/null || true
        find /home -name "android.toolchain.cmake" 2>/dev/null || true
        ls -la ${{ runner.temp }}/ndk/ 2>/dev/null || true
        echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
        echo "ANDROID_NDK=$ANDROID_NDK"

    - name: Build Android arm64
      env:
        ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |
        TOOLCHAIN=$(find $ANDROID_NDK -name "android.toolchain.cmake" | head -1)
        echo "Found toolchain: $TOOLCHAIN"

        mkdir -p build/android/arm64

        cmake -S . -B build/android/arm64           -DCMAKE_TOOLCHAIN_FILE=$TOOLCHAIN           -DANDROID_ABI=arm64-v8a           -DANDROID_PLATFORM=android-21           -DCMAKE_BUILD_TYPE=Release           -DDOBBY_BUILD_EXAMPLE=OFF           -DDOBBY_BUILD_TEST=OFF

        cmake --build build/android/arm64 --target dobby_static -j$(nproc)

        mkdir -p output
        cp build/android/arm64/libdobby.a output/libdobby.a
        cp include/dobby.h output/dobby.h

        echo "=== Build complete ==="
        ls -la output/
        file output/libdobby.a

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: dobby-android-arm64
        path: output/*
