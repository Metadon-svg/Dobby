name: Build Dobby Android

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c
        local-ndk-install-path: ${{ runner.temp }}/ndk

    - name: Build Android arm64
      run: |
        export ANDROID_NDK=${{ runner.temp }}/ndk/android-ndk-r25c
        mkdir -p build/android/arm64

        cmake -S . -B build/android/arm64           -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake           -DANDROID_ABI=arm64-v8a           -DANDROID_PLATFORM=android-21           -DCMAKE_BUILD_TYPE=Release           -DDOBBY_BUILD_EXAMPLE=OFF           -DDOBBY_BUILD_TEST=OFF

        cmake --build build/android/arm64 --target dobby_static -j$(nproc)

        mkdir -p output
        cp build/android/arm64/libdobby.a output/libdobby.a
        cp include/dobby.h output/dobby.h

        echo "=== Build complete ==="
        ls -la output/
        file output/libdobby.a

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: dobby-android-arm64
        path: output/*
